{% extends "base.html" %}
{% block content %}

<h1>Add Transaction</h1>

<div class="card">
  <form method="post">
    <label>Type</label>
    <select name="kind">
      <option value="expense">Expense</option>
      <option value="income">Income</option>
    </select>

    <label>Amount</label>
    <input name="amount" placeholder="e.g. 12.50" required>

    <label>Category</label>
    <select name="category">
      {% for c in categories %}
        <option value="{{ c }}">{{ c }}</option>
      {% endfor %}
    </select>

    <label>Date</label>
    <input name="occurred_on" value="{{ default_date }}" required>

    <label>Note</label>
    <input name="note" placeholder="Optional note">

    <button type="submit">Save Transaction</button>
  </form>
</div>

{% endblock %}
